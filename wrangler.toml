# --- START OF FILE wrangler.toml ---

# =========================================================================
# HARRISON INTERACTIVE | CLOUDFLARE EDGE MATRIX BLUEPRINT
# =========================================================================

# The exact name of your Cloudflare Pages project
name = "harrisoninteractive-web"

# The Next.js Edge compiler output directory
pages_build_output_dir = ".vercel/output/static"

# Locks the Cloudflare runtime API to a specific stable date
compatibility_date = "2024-03-21"

# Enable Node.js compatibility mode for Next.js APIs
compatibility_flags = ["nodejs_compat"]

# =========================================================================
# CLOUDFLARE KV DATABASE (LICENSE KEY MATRIX)
# =========================================================================
# This binds our edge server to a highly secure Key-Value datastore.
[[kv_namespaces]]
binding = "LICENSE_MATRIX"
id = "ae7cd7bd892b4754801ba66de4766a87"

# =========================================================================
# RUNTIME ENVIRONMENT VARIABLES (THE PUBLIC CONFIG MATRIX)
# =========================================================================
[vars]
# We inject public-facing routing variables here.
# NOTE: DO NOT PUT SECRETS HERE. SECRETS GO IN THE CLOUDFLARE DASHBOARD.

# --- OAUTH PUBLIC ROUTING ---
AUTH_URL = "https://harrisoninteractive.dev"
AUTH_GITHUB_ID = "PASTE_YOUR_GITHUB_CLIENT_ID_HERE"
AUTH_GOOGLE_ID = "PASTE_YOUR_GOOGLE_CLIENT_ID_HERE"

# --- END OF FILE wrangler.toml ---