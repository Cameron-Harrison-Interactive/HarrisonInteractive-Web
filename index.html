<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harrison Interactive | Omni-Network Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050505;
            --accent-blue: #00D2FF;
            --accent-red: #8B0000;
            --text-silver: #C0C0C0;
            --glass: rgba(5, 5, 5, 0.85);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-deep); 
            color: var(--text-silver); 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- ADAPTIVE COMMAND DECK --- */
        @keyframes flow-left { 0% { background-position: -200% 0; } 100% { background-position: 0% 0; } }
        @keyframes flow-right { 0% { background-position: 200% 0; } 100% { background-position: 0% 0; } }
        
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 100px;
            display: flex; justify-content: center; align-items: center;
            background: var(--glass); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 210, 255, 0.2); 
            z-index: 2000; overflow: hidden; padding: 0 5%;
        }

        header::before { content: ''; position: absolute; top: 0; left: 0; width: 50%; height: 100%; background: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0, 210, 255, 0.08) 41px, rgba(0, 210, 255, 0.08) 43px); background-size: 200% 100%; animation: flow-left 10s linear infinite; mask-image: linear-gradient(to right, black 70%, transparent); z-index: 1; }
        header::after { content: ''; position: absolute; top: 0; right: 0; width: 50%; height: 100%; background: repeating-linear-gradient(-90deg, transparent, transparent 40px, rgba(0, 210, 255, 0.08) 41px, rgba(0, 210, 255, 0.08) 43px); background-size: 200% 100%; animation: flow-right 10s linear infinite; mask-image: linear-gradient(to left, black 70%, transparent); z-index: 1; }

        .nav-group { display: flex; gap: 30px; z-index: 10; flex: 1; }
        .nav-group-left { justify-content: flex-end; padding-right: 40px; }
        .nav-group-right { justify-content: flex-start; padding-left: 40px; }

        .nav-link {
            font-family: 'Orbitron'; font-size: 0.75rem; color: #fff;
            text-decoration: none; letter-spacing: 2px; text-transform: uppercase;
            transition: 0.3s; position: relative; opacity: 0.7;
        }
        .nav-link:hover, .nav-link.active { opacity: 1; color: var(--accent-blue); text-shadow: 0 0 10px var(--accent-blue); }
        .nav-link.active::after { content: ''; position: absolute; bottom: -10px; left: 0; width: 100%; height: 2px; background: var(--accent-blue); }

        .studio-logo {
            font-family: 'Orbitron'; font-weight: 900; color: #fff;
            text-transform: uppercase; letter-spacing: 2px; font-size: 1.3rem;
            z-index: 10; cursor: pointer; text-align: center;
        }

        #menu-btn { display: none; position: absolute; right: 5%; color: var(--accent-blue); font-size: 1.8rem; cursor: pointer; z-index: 2100; }

        #mobile-nav {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100vh;
            background: rgba(5,5,5,0.98); z-index: 3000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 30px; transition: 0.4s;
        }
        #mobile-nav.active { right: 0; }
        #mobile-nav a { font-family: 'Orbitron'; font-size: 1.5rem; color: #fff; text-decoration: none; }

        /* --- LAYOUT LOGIC --- */
        main { display: flex; flex-direction: row; height: calc(100vh - 100px); margin-top: 100px; }

        .split-panel {
            flex: 1; display: flex; flex-direction: column; justify-content: flex-end; 
            align-items: center; padding: 40px; transition: flex 0.7s ease;
            position: relative; overflow: hidden;
            background-color: var(--bg-deep); /* Ensures seamless black if image ends early */
        }
        .split-panel:hover { flex: 2.5; }

        .panel-blood {
            /* FIXED: 100% width ensures the logo/text is NEVER cutoff on the sides */
            background-image: 
                linear-gradient(to bottom, rgba(5,5,5,0) 0%, rgba(5,5,5,0.95) 70%), 
                url('Blood-Yield/BY-Background.png');
            background-size: 100% auto; 
            background-position: center top; 
            background-repeat: no-repeat;
            border-right: 1px solid rgba(139,0,0,0.3);
        }
        .panel-handy {
            background-image: 
                linear-gradient(to bottom, rgba(5,5,5,0.1) 0%, rgba(5,5,5,0.95) 75%), 
                url('handy_terminal.png');
            background-size: 100% auto; 
            background-position: center top;
            background-repeat: no-repeat;
        }

        .content-box { max-width: 500px; z-index: 20; text-align: left; width: 100%; }
        .module-tag { font-family: 'Fira Code'; font-size: 0.7rem; letter-spacing: 4px; margin-bottom: 10px; }
        .panel-heading { font-family: 'Orbitron'; font-size: 2rem; color: #fff; margin-bottom: 15px; }
        .btn { padding: 15px 30px; font-family: 'Orbitron'; cursor: pointer; border: 1px solid var(--accent-blue); color: var(--accent-blue); text-decoration: none; display: inline-block; background: rgba(0,0,0,0.5); }

        /* --- RESPONSIVE BREAKPOINTS --- */
        @media (max-width: 1100px) {
            .nav-group { display: none; }
            #menu-btn { display: block; }
        }

        @media (max-width: 800px) {
            main { flex-direction: column; height: auto; overflow-y: visible; }
            .split-panel { width: 100%; min-height: 80vh; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
            /* Mobile uses 'cover' because text cutoff is less of an issue than a vertical gap */
            .panel-blood, .panel-handy { background-size: cover; background-position: center; }
            .split-panel:hover { flex: 1; }
            body { overflow-y: auto; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-group nav-group-left">
            <a href="index.html" class="nav-link active">Home</a>
            <a href="handy.html" class="nav-link">Handy</a>
            <a href="Blood-Yield/" class="nav-link">Blood-Yield</a>
        </div>
        <div class="studio-logo" onclick="window.location.href='index.html'">Harrison Interactive</div>
        <div id="menu-btn">☰</div>
        <div class="nav-group nav-group-right">
            <a href="about.html" class="nav-link">About</a>
            <a href="faq.html" class="nav-link">FAQ</a>
            <a href="legal.html" class="nav-link">Legal</a>
        </div>
    </header>

    <nav id="mobile-nav">
        <a href="index.html">Home</a>
        <a href="handy.html">Handy</a>
        <a href="Blood-Yield/">Blood-Yield</a>
        <a href="about.html">About</a>
        <a href="faq.html">FAQ</a>
        <a href="legal.html">Legal</a>
    </nav>

    <main>
        <div class="split-panel panel-blood">
            <div class="content-box">
                <div class="module-tag" style="color:var(--accent-red)">[ DARK_FANTASY_RPG ]</div>
                <h2 class="panel-heading">BLOOD-YIELD</h2>
                <a href="Blood-Yield/" class="btn" style="border-color:var(--accent-red); color:var(--accent-red)">> ACCESS_PROJECT</a>
            </div>
        </div>
        <div class="split-panel panel-handy">
            <div class="content-box">
                <div class="module-tag" style="color:var(--accent-blue)">[ EDITOR_UTILITY ]</div>
                <h2 class="panel-heading">HI | HANDY</h2>
                <a href="handy.html" class="btn">> VIEW_TOOLKIT</a>
            </div>
        </div>
    </main>

    <script>
        const btn = document.getElementById('menu-btn');
        const nav = document.getElementById('mobile-nav');
        btn.onclick = () => { 
            nav.classList.toggle('active'); 
            btn.innerText = nav.classList.contains('active') ? '✕' : '☰'; 
        };
    </script>
</body>
</html>
