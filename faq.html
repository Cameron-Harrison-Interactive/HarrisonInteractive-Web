<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ | Harrison Interactive</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&family=Fira+Code&display=swap" rel="stylesheet">
    
    <style>
        /* --- CORE BRANDING VARIABLES --- */
        :root {
            --bg-deep: #050505;
            --bg-navy: #0A192F;
            --accent-blue: #00D2FF;
            --accent-red: #8B0000;
            --text-silver: #C0C0C0;
            --glass: rgba(10, 25, 47, 0.9);
        }

        /* --- GLOBAL RESET --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-deep); 
            color: var(--text-silver); 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* --- CENTERED HEADER --- */
        header {
            position: fixed;
            top: 0; width: 100%; height: 80px;
            display: flex; justify-content: center; align-items: center;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 210, 255, 0.2);
            z-index: 1000;
        }

        .studio-logo {
            font-family: 'Orbitron';
            color: var(--text-silver);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 1.3rem;
            text-shadow: 0 0 10px var(--accent-blue);
        }

        .menu-trigger {
            position: absolute; right: 5%;
            color: var(--accent-blue); font-size: 2rem; cursor: pointer;
        }

        /* --- NAVIGATION DRAWER --- */
        #nav-menu {
            position: fixed; top: 0; right: -320px;
            width: 300px; height: 100%;
            background: var(--bg-navy);
            border-left: 2px solid var(--accent-blue);
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: 999; padding-top: 100px;
        }
        #nav-menu.active { right: 0; }
        #nav-menu a {
            display: block; padding: 20px 40px; color: #fff;
            text-decoration: none; font-family: 'Orbitron'; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* --- FAQ CONTAINER (BLUEPRINT GRID) --- */
        .faq-container {
            padding: 140px 5% 80px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: radial-gradient(circle at center, #0a192f 0%, #050505 100%);
            background-image: linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .terminal-header { text-align: center; margin-bottom: 50px; }

        .ue-panel {
            background: rgba(5, 5, 5, 0.9); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 210, 255, 0.1);
            border-left: 3px solid var(--accent-blue);
            padding: 35px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .terminal-input {
            width: 100%;
            background: rgba(0, 210, 255, 0.03);
            border: 1px solid rgba(0, 210, 255, 0.2);
            color: #fff;
            padding: 15px;
            margin-bottom: 15px;
            font-family: 'Fira Code', monospace;
            outline: none;
        }

        .terminal-input:focus { border-color: var(--accent-blue); }

        /* --- BUTTONS --- */
        .btn {
            padding: 15px 30px;
            font-family: 'Orbitron';
            background: transparent;
            border: 2px solid var(--accent-blue);
            color: var(--accent-blue);
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .btn:hover { background: var(--accent-blue); color: #000; box-shadow: 0 0 20px var(--accent-blue); }

        /* --- MODAL POPUP --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(8px);
            z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-box {
            background: var(--bg-navy); border: 1px solid var(--accent-blue);
            padding: 40px; text-align: center; max-width: 400px; width: 90%;
        }
    </style>
</head>
<body>

    <header>
        <div class="studio-logo">Harrison Interactive</div>
        <div class="menu-trigger" onclick="toggleMenu()">☰</div>
    </header>

    <nav id="nav-menu">
        <a href="index.html">Home Hub</a>
        <a href="blood-yield.html">Blood-Yield</a>
        <a href="handy.html">Handy Editor</a>
        <a href="faq.html" style="color:var(--accent-blue)">FAQ / Terminal</a>
    </nav>

    <main class="faq-container">
        <div class="terminal-header">
            <h1 style="font-family: 'Orbitron'; color: #fff; text-shadow: 0 0 15px var(--accent-blue);">SIGNAL TERMINAL</h1>
            <p style="font-family: 'Fira Code'; color: var(--accent-blue); font-size: 0.8rem; margin-top: 10px;">[ SECTOR_FAQ // ACTIVE ]</p>
        </div>

        <div style="display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; width: 100%;">
            <div class="ue-panel">
                <h3 style="font-family: 'Orbitron'; color: var(--accent-blue); margin-bottom: 20px;">QUERY_RESULTS</h3>
                <p style="margin-bottom: 15px;"><strong>> HANDY Compatibility?</strong><br>UE 5.4+ Stable releases.</p>
                <p><strong>> Blood-Yield Release?</strong><br>Targeting Q4 2026.</p>
            </div>

            <div class="ue-panel">
                <h3 style="font-family: 'Orbitron'; color: var(--accent-blue); margin-bottom: 20px;">TRANSMIT_DATA</h3>
                <form id="signal-form" action="https://hi-signal-terminal.bccomp97249.workers.dev" method="POST">
                    <input type="text" name="input_name" class="terminal-input" placeholder="input_name" required>
                    <input type="email" name="input_email" class="terminal-input" placeholder="input_email" required>
                    <textarea name="exec_message" class="terminal-input" placeholder="exec_message" rows="4" required></textarea>
                    <button type="submit" class="btn" id="submit-btn">EXECUTE SIGNAL</button>
                </form>
            </div>
        </div>
    </main>

    <div id="signal-modal" class="modal-overlay">
        <div class="modal-box">
            <h2 style="font-family: 'Orbitron'; color: #fff; margin-bottom: 15px;">TRANSMISSION<br>SUCCESSFUL</h2>
            <button class="btn" onclick="closeModal()">ACKNOWLEDGE</button>
        </div>
    </div>

    <script>
        function toggleMenu() { document.getElementById('nav-menu').classList.toggle('active'); }
        function closeModal() { 
            document.getElementById('signal-modal').style.display = 'none'; 
            document.getElementById('signal-form').reset(); 
        }

        document.getElementById('signal-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "TRANSMITTING...";
            
            fetch(this.action, {
                method: 'POST',
                body: new FormData(this)
            })
            .then(res => {
                if(res.ok) {
                    document.getElementById('signal-modal').style.display = 'flex';
                }
            })
            .catch(() => alert("Signal Interrupted."));
            
            btn.innerText = "EXECUTE SIGNAL";
        });
    </script>
</body>
</html>
