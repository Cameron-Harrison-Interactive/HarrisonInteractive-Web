<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELP/FAQ TERMINAL | Harrison Interactive</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&family=Fira+Code&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #050505;
            --bg-navy: #0A192F;
            --accent-blue: #00D2FF;
            --text-silver: #C0C0C0;
            --glass: rgba(10, 25, 47, 0.9);
        }

        /* --- GLOBAL & SCROLL RESET --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-deep); 
            color: var(--text-silver); 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- FIXED CENTERED HEADER --- */
        header {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; justify-content: center; align-items: center;
            background: var(--glass); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 210, 255, 0.2); z-index: 1000;
        }

        .studio-logo {
            font-family: 'Orbitron'; color: var(--text-silver);
            text-transform: uppercase; letter-spacing: 4px; font-size: 1.2rem;
            text-shadow: 0 0 10px var(--accent-blue);
        }

        .menu-trigger { position: absolute; right: 5%; color: var(--accent-blue); font-size: 1.8rem; cursor: pointer; }

        /* --- NAV DRAWER --- */
        #nav-menu {
            position: fixed; top: 0; right: -320px; width: 300px; height: 100%;
            background: var(--bg-navy); border-left: 2px solid var(--accent-blue);
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); z-index: 999; padding-top: 100px;
        }
        #nav-menu.active { right: 0; }
        #nav-menu a { display: block; padding: 20px 40px; color: #fff; text-decoration: none; font-family: 'Orbitron'; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* --- MAIN TERMINAL AREA --- */
        .terminal-container {
            flex: 1;
            padding: 140px 5% 100px; 
            display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(circle at center, #0a192f 0%, #050505 100%);
            background-image: linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .terminal-header { text-align: center; margin-bottom: 50px; }

        .ue-panel {
            background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 210, 255, 0.1); border-left: 4px solid var(--accent-blue);
            padding: 35px; width: 100%; max-width: 500px; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .terminal-input {
            width: 100%; background: rgba(0, 210, 255, 0.03); border: 1px solid rgba(0, 210, 255, 0.2);
            color: #fff; padding: 15px; margin-bottom: 15px; font-family: 'Fira Code', monospace; outline: none;
            transition: 0.3s;
        }
        .terminal-input:focus { border-color: var(--accent-blue); box-shadow: 0 0 10px rgba(0, 210, 255, 0.15); }

        .btn {
            padding: 15px 30px; font-family: 'Orbitron'; background: transparent;
            border: 2px solid var(--accent-blue); color: var(--accent-blue);
            cursor: pointer; width: 100%; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
        }
        .btn:hover { background: var(--accent-blue); color: #000; box-shadow: 0 0 20px var(--accent-blue); }

        /* --- FOOTER --- */
        footer {
            background: var(--bg-deep);
            padding: 40px 5%;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
        }

        .legal-link {
            display: inline-block; margin-top: 15px; font-family: 'Fira Code';
            color: var(--accent-blue); text-decoration: none; font-size: 0.7rem;
            letter-spacing: 1px; transition: 0.3s;
        }
        .legal-link:hover { text-shadow: 0 0 8px var(--accent-blue); letter-spacing: 2px; }

        /* --- MODAL --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(10px);
            z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-box { 
            background: var(--bg-navy); border: 1px solid var(--accent-blue); 
            padding: 40px; text-align: center; max-width: 420px; width: 90%;
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.2);
        }
    </style>
</head>
