<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANDY EDITOR | Harrison Interactive</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&family=Fira+Code&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #050505;
            --bg-navy: #0A192F;
            --accent-blue: #00D2FF;
            --text-silver: #C0C0C0;
            --glass: rgba(10, 25, 47, 0.95);
            
            /* Blueprint Data Colors */
            --bp-exec: #FFFFFF;
            --bp-string: #FF00FF;
            --bp-text: #00FFFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-deep);
            background-image: 
                linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px),
                radial-gradient(circle at top center, #0a192f 0%, transparent 80%);
            background-size: 50px 50px, 50px 50px, 100% 100%;
            background-attachment: fixed;
            color: var(--text-silver); 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- HEADER & NAV --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 80px;
            display: flex; justify-content: center; align-items: center;
            background: var(--glass); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 210, 255, 0.2); 
            z-index: 2000;
        }

        .studio-logo {
            font-family: 'Orbitron'; color: var(--text-silver);
            text-transform: uppercase; letter-spacing: 4px; font-size: 1.2rem;
            text-shadow: 0 0 10px var(--accent-blue);
        }

        #menu-btn { 
            position: absolute; right: 5%; color: var(--accent-blue); font-size: 2rem; 
            cursor: pointer; transition: 0.3s; z-index: 2100;
        }
        #menu-btn:hover { text-shadow: 0 0 15px var(--accent-blue); }

        #nav-menu {
            position: fixed; top: 0; right: -320px; width: 300px; height: 100vh;
            background: var(--bg-navy); border-left: 2px solid var(--accent-blue);
            transition: right 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            z-index: 3000; padding-top: 100px; box-shadow: -10px 0 30px rgba(0,0,0,0.8);
        }
        #nav-menu.active { right: 0; }
        #nav-menu a { display: block; padding: 20px 40px; color: #fff; text-decoration: none; font-family: 'Orbitron'; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        #nav-menu a:hover { background: rgba(0, 210, 255, 0.1); color: var(--accent-blue); padding-left: 50px; }

        /* --- MAIN CONTENT (FIXED Z-INDEX PLUMBING) --- */
        main {
            position: relative; /* REQUIRED FOR Z-INDEX */
            z-index: 10; 
            flex: 1; padding: 130px 5% 80px;
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 1200px; margin: 0 auto;
        }

        .hero { text-align: center; margin-bottom: 40px; width: 100%; }
        
        .handy-banner {
            width: 100%; max-width: 1000px; height: auto; border: 1px solid rgba(0, 210, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.1); margin-bottom: 60px;
        }

        /* --- TIER GRID --- */
        .tier-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px; width: 100%; margin-bottom: 60px;
        }

        .tier-card {
            background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 30px;
            text-align: center; display: flex; flex-direction: column;
            transition: 0.3s;
        }

        .tier-card:hover { border-color: rgba(0, 210, 255, 0.4); transform: translateY(-5px); }

        .tier-ultimate {
            border: 1px solid var(--accent-blue);
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.15);
            position: relative;
        }
        
        .tier-ultimate::before {
            content: 'FLAGSHIP'; position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
            background: var(--accent-blue); color: #000; font-family: 'Fira Code'; font-size: 0.7rem;
            padding: 2px 10px; font-weight: bold; letter-spacing: 2px;
        }

        /* PRICING STYLES OVERHAUL */
        .tier-price { 
            font-family: 'Orbitron'; font-size: 2.5rem; color: var(--accent-blue); 
            margin: 15px 0; text-shadow: 0 0 15px rgba(0, 210, 255, 0.4); 
            font-weight: bold;
        }
        .tier-price span { font-size: 1rem; color: var(--text-silver); font-family: 'Inter'; font-weight: 300; text-shadow: none; }
        
        .tier-list { text-align: left; margin: 20px 0; font-size: 0.85rem; flex: 1; line-height: 1.5; color: #fff; }
        .tier-list li { margin-bottom: 12px; list-style: none; border-bottom: 1px dashed rgba(255,255,255,0.05); padding-bottom: 8px; }
        .tier-list li::before { content: '>'; color: var(--accent-blue); font-family: 'Fira Code'; margin-right: 8px; font-weight: bold; }
        .tier-highlight { color: var(--text-silver); font-family: 'Fira Code'; font-size: 0.8rem; display: block; margin-top: 3px; opacity: 0.7; }

        /* --- MODULE GRID --- */
        .ue-panel {
            background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 210, 255, 0.1); border-left: 4px solid var(--accent-blue);
            padding: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .code-block {
            font-family: 'Fira Code'; font-size: 0.8rem; color: #fff;
            background: rgba(0,0,0,0.6); padding: 20px; border-left: 2px solid #fff;
            margin-top: 15px;
        }

        .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
        .dot-exec { background: var(--bp-exec); box-shadow: 0 0 5px var(--bp-exec); }
        .dot-string { background: var(--bp-string); box-shadow: 0
