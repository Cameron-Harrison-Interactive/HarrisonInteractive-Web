<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANDY EDITOR | Harrison Interactive</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root { --bg-deep: #050505; --accent-blue: #00D2FF; --text-silver: #C0C0C0; --glass: rgba(5, 5, 5, 0.85); --bp-exec: #FFFFFF; --bp-string: #FF00FF; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-deep); background-image: linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px), radial-gradient(circle at top center, #0a192f 0%, transparent 80%); background-size: 50px 50px, 50px 50px, 100% 100%; background-attachment: fixed; color: var(--text-silver); font-family: 'Inter', sans-serif; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* ADAPTIVE HEADER */
        @keyframes flow-left { 0% { background-position: -200% 0; } 100% { background-position: 0% 0; } }
        @keyframes flow-right { 0% { background-position: 200% 0; } 100% { background-position: 0% 0; } }
        header { position: fixed; top: 0; left: 0; width: 100%; height: 100px; display: flex; justify-content: center; align-items: center; background: var(--glass); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0, 210, 255, 0.2); z-index: 2000; overflow: hidden; padding: 0 5%; }
        header::before { content: ''; position: absolute; top: 0; left: 0; width: 50%; height: 100%; background: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0, 210, 255, 0.08) 41px, rgba(0, 210, 255, 0.08) 43px); background-size: 200% 100%; animation: flow-left 10s linear infinite; mask-image: linear-gradient(to right, black 70%, transparent); z-index: 1; }
        header::after { content: ''; position: absolute; top: 0; right: 0; width: 50%; height: 100%; background: repeating-linear-gradient(-90deg, transparent, transparent 40px, rgba(0, 210, 255, 0.08) 41px, rgba(0, 210, 255, 0.08) 43px); background-size: 200% 100%; animation: flow-right 10s linear infinite; mask-image: linear-gradient(to left, black 70%, transparent); z-index: 1; }
        .nav-group { display: flex; gap: 30px; z-index: 10; flex: 1; }
        .nav-group-left { justify-content: flex-end; padding-right: 40px; }
        .nav-group-right { justify-content: flex-start; padding-left: 40px; }
        .nav-link { font-family: 'Orbitron'; font-size: 0.75rem; color: #fff; text-decoration: none; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; position: relative; opacity: 0.7; }
        .nav-link:hover, .nav-link.active { opacity: 1; color: var(--accent-blue); text-shadow: 0 0 10px var(--accent-blue); }
        .nav-link.active::after { content: ''; position: absolute; bottom: -10px; left: 0; width: 100%; height: 2px; background: var(--accent-blue); }
        .studio-logo { font-family: 'Orbitron'; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 2px; font-size: 1.3rem; z-index: 10; cursor: pointer; text-align: center; }
        #menu-btn { display: none; position: absolute; right: 5%; color: var(--accent-blue); font-size: 1.8rem; cursor: pointer; z-index: 2100; }
        #mobile-nav { position: fixed; top: 0; right: -100%; width: 100%; height: 100vh; background: rgba(5,5,5,0.98); z-index: 3000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 30px; transition: 0.4s; }
        #mobile-nav.active { right: 0; }
        #mobile-nav a { font-family: 'Orbitron'; font-size: 1.5rem; color: #fff; text-decoration: none; }

        /* CONTENT */
        main { flex: 1; padding: 140px 5% 80px; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 1200px; margin: 0 auto; z-index: 10; }
        .hero { text-align: center; margin-bottom: 40px; }
        .handy-banner { width: 100%; max-width: 1000px; height: auto; border: 1px solid rgba(0, 210, 255, 0.2); margin-bottom: 60px; }
        .tier-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; width: 100%; }
        .tier-card { background: rgba(5, 5, 5, 0.85); border: 1px solid rgba(255, 255, 255, 0.1); padding: 30px; display: flex; flex-direction: column; transition: 0.3s; }
        .btn { padding: 12px 25px; font-family: 'Orbitron'; border: 1px solid var(--accent-blue); color: var(--accent-blue); cursor: pointer; background: transparent; margin-top: 15px; }

        @media (max-width: 1100px) { .nav-group { display: none; } #menu-btn { display: block; } }
    </style>
</head>
<body>
    <header>
        <div class="nav-group nav-group-left">
            <a href="index.html" class="nav-link">Home</a>
            <a href="handy.html" class="nav-link active">Handy</a>
            <a href="Blood-Yield/" class="nav-link">Blood-Yield</a>
        </div>
        <div class="studio-logo" onclick="window.location.href='index.html'">Harrison Interactive</div>
        <div id="menu-btn">☰</div>
        <div class="nav-group nav-group-right">
            <a href="about.html" class="nav-link">About</a>
            <a href="faq.html" class="nav-link">FAQ</a>
            <a href="legal.html" class="nav-link">Legal</a>
        </div>
    </header>

    <nav id="mobile-nav">
        <a href="index.html">Home</a>
        <a href="handy.html">Handy</a>
        <a href="Blood-Yield/">Blood-Yield</a>
        <a href="about.html">About</a>
        <a href="faq.html">FAQ</a>
        <a href="legal.html">Legal</a>
    </nav>

    <main>
        <div class="hero">
            <h1 style="font-family: 'Orbitron'; color: #fff; font-size: clamp(2rem, 5vw, 4rem); text-shadow: 0 0 15px var(--accent-blue);">HANDY <span style="color: var(--accent-blue);">AUTOMATION</span></h1>
        </div>
        <img src="handy_banner.png" alt="HANDY Banner" class="handy-banner">
        <div class="tier-grid">
            <div class="tier-card"><h3>LITE</h3><button class="btn">VIEW ON FAB</button></div>
            <div class="tier-card"><h3>ELITE</h3><button class="btn">VIEW ON FAB</button></div>
            <div class="tier-card"><h3>ULTIMATE</h3><button class="btn" style="opacity:0.5">COMING SOON</button></div>
        </div>
    </main>

    <script>
        const btn = document.getElementById('menu-btn');
        const nav = document.getElementById('mobile-nav');
        btn.onclick = () => { nav.classList.toggle('active'); btn.innerText = nav.classList.contains('active') ? '✕' : '☰'; };
    </script>
</body>
</html>
