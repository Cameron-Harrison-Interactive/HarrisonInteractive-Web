<main class="section">
        <div class="ancient-scroll">
            <h2 style="font-family:'Orbitron'; color:var(--gold-yield); letter-spacing:4px; font-weight: 900;">JOIN THE COLD HARVEST</h2>
            <p style="margin: 20px auto; font-size: 1.1rem; max-width: 600px; line-height: 1.6; font-style: italic;">
                "The earth yields nothing but blood. Enter your mark to receive word of the coming Alpha."
            </p>

            <form id="waitlist-form" style="margin-top: 40px;">
                <div class="input-container">
                    <input type="email" id="email" class="gothic-input" placeholder="MARK YOUR EMAIL" required>
                </div>
                <button type="submit" class="btn" id="submit-btn">INITIATE UPLINK</button>
            </form>
            <p id="status-msg" style="margin-top:25px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;"></p>
        </div>
    </main>

    <style>
        /* New Aesthetic Overrides */
        .ancient-scroll {
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid var(--rust);
            padding: 80px 40px;
            box-shadow: 0 0 50px rgba(139, 0, 0, 0.2), inset 0 0 100px rgba(0,0,0,1);
            position: relative;
        }
        /* Adding a "Gothic Spike" corner effect */
        .ancient-scroll::after {
            content: ''; position: absolute; top: -10px; left: -10px; width: 30px; height: 30px;
            border-top: 3px solid var(--blood); border-left: 3px solid var(--blood);
        }
        .ancient-scroll::before {
            content: ''; position: absolute; bottom: -10px; right: -10px; width: 30px; height: 30px;
            border-bottom: 3px solid var(--blood); border-right: 3px solid var(--blood);
        }

        .gothic-input {
            width: 100%; max-width: 450px; padding: 20px;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid var(--stone);
            color: #fff; font-family: 'Orbitron'; text-align: center;
            letter-spacing: 2px; outline: none; transition: 0.3s;
            margin-bottom: 20px;
        }
        .gothic-input:focus {
            border-color: var(--blood);
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.3);
        }
    </style>
