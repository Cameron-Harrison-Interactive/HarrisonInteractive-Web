<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood-Yield | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --rust: #8A3324;
            --stone: #4A4E69;
            --blood: #8B0000;
            --gold-yield: #F9D423;
            --text-primary: #C0C0C0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(5, 5, 5, 0.9), rgba(5, 5, 5, 0.95)), 
                        url('BY-Background.png') no-repeat center center/cover fixed;
        }

        nav {
            background: rgba(0, 0, 0, 0.95);
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 40px;
            font-family: 'Orbitron', sans-serif;
            border-bottom: 2px solid var(--rust);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            text-decoration: none;
            color: var(--stone);
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        nav a:hover { color: var(--blood); text-shadow: 0 0 10px var(--blood); }

        .hero {
            height: 70vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .logo-by {
            font-size: 5rem;
            font-family: 'Orbitron';
            background: linear-gradient(to bottom, #FFD700 0%, #F9D423 40%, #8B0000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(139, 0, 0, 0.4));
            margin-bottom: 20px;
        }

        .section {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }

        .newsletter-form {
            background: rgba(138, 51, 36, 0.05);
            padding: 40px;
            border: 1px solid var(--rust);
            margin-top: 40px;
        }

        input[type="email"] {
            padding: 15px;
            width: 320px;
            background: #101010;
            border: 1px solid var(--stone);
            color: white;
            margin-bottom: 10px;
        }

        .btn {
            padding: 15px 40px;
            background: var(--blood);
            color: white;
            border: 1px solid var(--rust);
            font-family: 'Orbitron';
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover { box-shadow: 0 0 20px var(--blood); filter: brightness(1.2); }

        footer { padding: 40px; text-align: center; font-size: 0.7rem; color: var(--stone); }
    </style>
</head>
<body>

<nav>
    <a href="index.html" style="color: var(--blood);">HOME</a>
    <a href="world.html">THE WORLD</a>
    <a href="lore.html">LORE</a>
    <a href="community.html">COMMUNITY</a>
    <a href="https://harrisoninteractive.dev" target="_blank">HANDY TOOL</a>
</nav>

<header class="hero">
    <h1 class="logo-by">BLOOD-YIELD</h1>
    <p style="font-family: 'Montserrat'; letter-spacing: 2px;">CRAFTED WITH HANDY FOR UE5 | ALPHA COMING 2026</p>
</header>

<section class="section">
    <div class="newsletter-form">
        <h2 style="font-family: 'Orbitron'; margin-bottom: 15px;">JOIN THE HARVEST</h2>
        <p style="margin-bottom: 20px;">Connect your account to PlayFab for early development access.</p>
        <form>
            <input type="email" placeholder="ENTER EMAIL ADDRESS" required><br>
            <button type="submit" class="btn">INITIALIZE UPLINK</button>
        </form>
    </div>
</section>

<footer>
    <p>EST. 2026 | UNRIVALED INNOVATION | OFFICIAL COMPANY SEAL</p>
</footer>

</body>
</html>
