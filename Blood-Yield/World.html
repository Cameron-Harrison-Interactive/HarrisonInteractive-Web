<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood-Yield | The World</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505; --rust: #8A3324; --stone: #4A4E69; --blood: #8B0000; --text: #C0C0C0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(rgba(5, 5, 5, 0.9), rgba(5, 5, 5, 0.95)), url('BY-Background.png') no-repeat center center/cover fixed;
            color: var(--text); font-family: 'Inter', sans-serif;
        }
        nav { background: rgba(0,0,0,0.95); padding: 20px; display: flex; justify-content: center; gap: 40px; border-bottom: 2px solid var(--rust); position: sticky; top: 0; font-family: 'Orbitron'; }
        nav a { text-decoration: none; color: var(--stone); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }
        nav a:hover { color: var(--blood); }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 60px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; margin-top: 40px; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid var(--stone); padding: 20px; transition: 0.3s; }
        .card:hover { border-color: var(--rust); background: rgba(138,51,36,0.03); }
        .media-placeholder { width: 100%; height: 200px; background: #101010; border: 1px dashed var(--rust); display: flex; align-items: center; justify-content: center; color: var(--rust); font-family: 'Orbitron'; margin-bottom: 15px; }
        h1, h3 { font-family: 'Orbitron'; text-transform: uppercase; letter-spacing: 3px; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">HOME</a>
    <a href="world.html" style="color: var(--blood);">THE WORLD</a>
    <a href="lore.html">LORE</a>
    <a href="community.html">COMMUNITY</a>
    <a href="https://harrisoninteractive.dev" target="_blank">HANDY TOOL</a>
</nav>

<div class="container">
    <h1 style="text-align: center;">GEOGRAPHICAL DATA</h1>
    <div class="grid">
        <div class="card">
            <div class="media-placeholder">[IMAGE: THE IRON BARRENS]</div>
            <h3>THE IRON BARRENS</h3>
            <p>Industrial waste and circuit traces dominate this sector. Avoid AI Sentinels.</p>
        </div>
        <div class="card">
            <div class="media-placeholder">[IMAGE: SANGUINE FORGE]</div>
            <h3>SANGUINE FORGE</h3>
            <p>The refinery where Blood is converted to Yield. Highly volatile sector.</p>
        </div>
    </div>
</div>

</body>
</html>
